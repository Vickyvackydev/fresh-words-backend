name: Deploy Backend to Droplet

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build Binary
        run: |
          env GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o fresh-words-server cmd/server/main.go

      - name: Prepare server for upload (Unlink running binary)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            if [ -f /var/www/fresh-words-backend/fresh-words-server ]; then
              mv /var/www/fresh-words-backend/fresh-words-server /var/www/fresh-words-backend/fresh-words-server.old
            fi

      - name: Copy Binary via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "fresh-words-server"
          target: "/var/www/fresh-words-backend"
          overwrite: true

      - name: Restart Systemd Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            sudo systemctl restart fresh-words
            rm -f /var/www/fresh-words-backend/fresh-words-server.old
